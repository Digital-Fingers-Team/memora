services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 4000
    expose:
      - "4000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
    command: ["node", "apps/api/dist/worker.js"]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api/v1
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    restart: unless-stopped
